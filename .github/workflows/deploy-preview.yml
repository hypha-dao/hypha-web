name: Deploy Preview

on:
  pull_request:
  merge_group:
  workflow_dispatch:
    inputs:
      force_preview_deploy:
        description: 'Force preview deployment even when detect-changes is false'
        required: true
        default: true
        type: boolean
      pr_number:
        description: 'PR number used for deterministic preview alias naming'
        required: false
        type: string

concurrency:
  group: deploy-preview-${{ github.event.pull_request.number || github.event.merge_group.head_sha || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  detect-changes:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    outputs:
      has_migrations: ${{ steps.detect.outputs.has_migrations }}
      has_preview_deploy_changes: ${{ steps.detect.outputs.has_preview_deploy_changes }}
    steps:
      - uses: actions/checkout@v4
      - name: Detect Changes
        id: detect
        uses: ./.github/actions/detect-changes

  check-types:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm turbo run check-types --filter=web

  i18n-verify:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Verify i18n locale parity
        run: pnpm run verify:messages

  deploy-preview:
    needs: [detect-changes, check-types, i18n-verify]
    if: |
      (github.event_name == 'pull_request' && needs.detect-changes.outputs.has_preview_deploy_changes == 'true') ||
      (github.event_name == 'workflow_dispatch' && inputs.force_preview_deploy == true)
    runs-on: blacksmith-4vcpu-ubuntu-2404
    env:
      NEON_DATABASE_USERNAME: ${{ secrets.DB_USER_NAME }}
      NEON_DATABASE_NAME: ${{ secrets.DB_NAME }}
      NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
      NEON_PROJECT_ID: ${{ secrets.NEON_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      DEFAULT_DB_URL: ${{ secrets.POSTGRES_URL }}
      PRIVATE_KEY: ${{ secrets.EVM_SC_OWNER_PRIVATE_KEY }}
      DEFAULT_DB_AUTHENTICATED_URL: ${{ secrets.POSTGRES_AUTHENTICATED_URL }}
      DEFAULT_DB_ANONYMOUS_URL: ${{ secrets.POSTGRES_ANONYMOUS_URL }}
      PR_OR_QUEUE_HEAD: ${{ github.event.pull_request.number || github.event.merge_group.head_sha || inputs.pr_number || github.run_id }}
      PREVIEW_ALIAS_SUFFIX: ${{ github.event.pull_request.number || inputs.pr_number || github.run_id }}

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Get branch name
        if: needs.detect-changes.outputs.has_migrations == 'true'
        id: branch-name
        uses: tj-actions/branch-names@v8

      - name: Create Neon Branch
        if: needs.detect-changes.outputs.has_migrations == 'true'
        id: create-branch
        uses: neondatabase/create-branch-action@v5
        with:
          project_id: ${{ env.NEON_PROJECT_ID }}
          parent: main
          branch_name: preview/pr-${{ env.PR_OR_QUEUE_HEAD }}-${{ steps.branch-name.outputs.current_branch }}
          username: ${{ env.NEON_DATABASE_USERNAME }}
          database: ${{ env.NEON_DATABASE_NAME }}
          api_key: ${{ env.NEON_API_KEY }}

      - name: Update branch variables
        if: needs.detect-changes.outputs.has_migrations == 'true'
        run: |
          echo "BRANCH_DB_URL=${{ steps.create-branch.outputs.db_url_with_pooler }}" >> $GITHUB_ENV

      - name: Install Vercel CLI
        run: npm install --global vercel@48.0.0

      - name: Pull Vercel Environment Information
        run: vercel pull --yes --environment=preview --token=${{ env.VERCEL_TOKEN }}

      - name: Run Migrations
        if: needs.detect-changes.outputs.has_migrations == 'true'
        env:
          BRANCH_DB_URL: ${{ steps.create-branch.outputs.db_url_with_pooler }}
        run: |
          vercel env pull --environment=preview --token=${{ env.VERCEL_TOKEN }}
          pnpm run migrate

      - name: Post Schema Diff Comment to PR
        if: needs.detect-changes.outputs.has_migrations == 'true'
        continue-on-error: true
        timeout-minutes: 2
        uses: neondatabase/schema-diff-action@v1
        with:
          project_id: ${{ secrets.NEON_PROJECT_ID }}
          compare_branch: preview/pr-${{ env.PR_OR_QUEUE_HEAD }}-${{ steps.branch-name.outputs.current_branch }}
          api_key: ${{ secrets.NEON_API_KEY }}

      - name: Build Project Artifacts
        env:
          BRANCH_DB_URL: ${{ steps.create-branch.outputs.db_url_with_pooler }}
        run: |
          vercel env pull --environment=preview --token=${{ env.VERCEL_TOKEN }}
          vercel build --token=${{ env.VERCEL_TOKEN }}

      - name: Deploy Preview to Vercel
        id: deploy
        env:
          BRANCH_DB_URL: ${{ steps.create-branch.outputs.db_url_with_pooler }}
          VERCEL_TOKEN: ${{ env.VERCEL_TOKEN }}
        run: |
          set -euo pipefail
          # `vercel deploy` prints progress to stdout; a single-line `echo key=$(...)` into
          # GITHUB_OUTPUT breaks when the capture is multiline, leaving preview_url empty and
          # breaking `vercel alias`. Parse the deployment URL explicitly.
          export CI=1 FORCE_COLOR=0 NO_COLOR=1
          deploy_output=""
          for attempt in 1 2 3; do
            if deploy_output="$(
              vercel deploy --prebuilt --yes \
                --token="${VERCEL_TOKEN}" \
                --env "BRANCH_DB_URL=${BRANCH_DB_URL:-}" \
                2>&1
            )"; then
              break
            fi
            if [ "${attempt}" -eq 3 ]; then
              printf '%s\n' "${deploy_output}"
              exit 1
            fi
            echo "vercel deploy failed (attempt ${attempt}/3), retrying in 30s..."
            sleep 30
          done
          preview_url="$(
            set +o pipefail
            printf '%s\n' "${deploy_output}" \
              | grep -Eo 'https://[a-zA-Z0-9][a-zA-Z0-9.-]*\.vercel\.app' \
              | tail -n 1
          )"
          if [ -z "${preview_url}" ]; then
            echo '::error::Could not parse a *.vercel.app URL from vercel deploy output.'
            printf '%s\n' "${deploy_output}"
            exit 1
          fi
          echo "preview_url=${preview_url}" >> "${GITHUB_OUTPUT}"

      - name: Alias preview to deterministic PR domain
        id: alias
        env:
          VERCEL_TOKEN: ${{ env.VERCEL_TOKEN }}
          PREVIEW_ALIAS_SUFFIX: ${{ env.PREVIEW_ALIAS_SUFFIX }}
          PREVIEW_URL: ${{ steps.deploy.outputs.preview_url }}
        run: |
          set -euo pipefail
          PREVIEW_ALIAS_DOMAIN="pr-${PREVIEW_ALIAS_SUFFIX}.preview-app.hypha.earth"
          vercel alias set "${PREVIEW_URL}" "${PREVIEW_ALIAS_DOMAIN}" --token="${VERCEL_TOKEN}"
          echo "preview_custom_url=https://${PREVIEW_ALIAS_DOMAIN}" >> "$GITHUB_OUTPUT"

      - name: Comment custom preview URL on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          PREVIEW_CUSTOM_URL: ${{ steps.alias.outputs.preview_custom_url }}
        with:
          script: |
            const marker = '<!-- custom-preview-domain -->';
            const body = `${marker}
            🔗 Custom preview URL: ${process.env.PREVIEW_CUSTOM_URL}`;

            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });

            const existing = comments.find(
              (comment) =>
                comment.user?.type === 'Bot' &&
                comment.body?.includes(marker),
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }

  main:
    needs: [detect-changes]
    runs-on: blacksmith-4vcpu-ubuntu-2404
    env:
      NEON_DATABASE_USERNAME: ${{ secrets.DB_USER_NAME }}
      NEON_DATABASE_NAME: ${{ secrets.DB_NAME }}
      NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
      NEON_PROJECT_ID: ${{ secrets.NEON_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      DEFAULT_DB_URL: ${{ secrets.POSTGRES_URL }}
      PRIVATE_KEY: ${{ secrets.EVM_SC_OWNER_PRIVATE_KEY }}
      DEFAULT_DB_AUTHENTICATED_URL: ${{ secrets.POSTGRES_AUTHENTICATED_URL }}
      DEFAULT_DB_ANONYMOUS_URL: ${{ secrets.POSTGRES_ANONYMOUS_URL }}
      PR_OR_QUEUE_HEAD: ${{ github.event.pull_request.number || github.event.merge_group.head_sha }}

    steps:
      - uses: actions/checkout@v4

      # Must run before format:check — if format fails, later steps are skipped but
      # Delete Neon Branch uses `if: always()` and needs this output for the branch name.
      - name: Get branch name
        if: needs.detect-changes.outputs.has_migrations == 'true'
        id: branch-name
        uses: tj-actions/branch-names@v8

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - run: pnpm run format:check

      - name: Create Neon Branch
        if: needs.detect-changes.outputs.has_migrations == 'true'
        id: create-branch
        uses: neondatabase/create-branch-action@v5
        with:
          project_id: ${{ env.NEON_PROJECT_ID }}
          parent: main
          branch_name: test/pr-${{ env.PR_OR_QUEUE_HEAD }}-${{ steps.branch-name.outputs.current_branch }}
          username: ${{ env.NEON_DATABASE_USERNAME }}
          database: ${{ env.NEON_DATABASE_NAME }}
          api_key: ${{ env.NEON_API_KEY }}

      - name: Update branch variables
        if: needs.detect-changes.outputs.has_migrations == 'true'
        run: |
          echo "BRANCH_DB_URL=${{ steps.create-branch.outputs.db_url_with_pooler }}" >> $GITHUB_ENV

      - name: Run Migrations
        if: needs.detect-changes.outputs.has_migrations == 'true'
        run: |
          echo "BRANCH_DB_URL: ${{ steps.create-branch.outputs.db_url_with_pooler }}" >> apps/web/.env.production
          pnpm run migrate

      - name: Delete Neon Branch
        if: always() && needs.detect-changes.outputs.has_migrations == 'true' && steps.create-branch.outcome == 'success'
        uses: neondatabase/delete-branch-action@v3
        with:
          project_id: ${{ secrets.NEON_PROJECT_ID }}
          branch: test/pr-${{ env.PR_OR_QUEUE_HEAD }}-${{ steps.branch-name.outputs.current_branch }}
          api_key: ${{ secrets.NEON_API_KEY }}
