name: Deploy Preview

concurrency:
  group: preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

on: [pull_request]

env:
  NEON_DATABASE_USERNAME: ${{ secrets.DB_USER_NAME }} # change this to your database username
  NEON_DATABASE_NAME: ${{ secrets.DB_NAME }} # change this to your database name
  NEON_API_KEY: ${{ secrets.NEON_API_KEY }} # You can generate a an API key in your account settings
  NEON_PROJECT_ID: ${{ secrets.NEON_PROJECT_ID }} # You can find this in your project settings
  VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
  VERCEL_PREVIEW_DOMAIN: ${{ secrets.VERCEL_PREVIEW_DOMAIN }}
  DEFAULT_DB_URL: ${{ secrets.POSTGRES_URL }}
  PRIVATE_KEY: ${{ secrets.EVM_SC_OWNER_PRIVATE_KEY }}
  DEFAULT_DB_AUTHENTICATED_URL: ${{ secrets.POSTGRES_AUTHENTICATED_URL }}
  DEFAULT_DB_ANONYMOUS_URL: ${{secrets.POSTGRES_ANONYMOUS_URL}}

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      has_migrations: ${{ steps.detect.outputs.has_migrations }}
    steps:
      - uses: actions/checkout@v4
      - name: Detect Changes
        id: detect
        uses: ./.github/actions/detect-changes

  deploy-preview:
    needs: detect-changes
    permissions: write-all
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Debug step
      - name: Debug Workflow
        run: echo "Running Deploy Preview workflow for PR ${{ github.event.pull_request.number }}"

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - run: pnpm i
      - uses: nrwl/nx-set-shas@v4

      - name: Get branch name
        if: needs.detect-changes.outputs.has_migrations == 'true'
        id: branch-name
        uses: tj-actions/branch-names@v8

      - name: Create Neon Branch
        if: needs.detect-changes.outputs.has_migrations == 'true'
        id: create-branch
        uses: neondatabase/create-branch-action@v5
        with:
          project_id: ${{ env.NEON_PROJECT_ID }}
          parent: main
          branch_name: preview/pr-${{ github.event.number }}-${{ steps.branch-name.outputs.current_branch }}
          username: ${{ env.NEON_DATABASE_USERNAME }}
          database: ${{ env.NEON_DATABASE_NAME }}
          api_key: ${{ env.NEON_API_KEY }}

      - name: Update branch variables
        if: needs.detect-changes.outputs.has_migrations == 'true'
        run: |
          echo "BRANCH_DB_URL=${{ steps.create-branch.outputs.db_url_with_pooler }}" >> $GITHUB_ENV

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel Environment Information
        run: vercel pull --yes --environment=preview --token=${{ env.VERCEL_TOKEN }}

      - name: Run Migrations
        if: needs.detect-changes.outputs.has_migrations == 'true'
        run: |
          echo "BRANCH_DB_URL: ${{ steps.create-branch.outputs.db_url_with_pooler }}" >> apps/web/.env
          pnpm run migrate

      - name: Post Schema Diff Comment to PR
        if: needs.detect-changes.outputs.has_migrations == 'true'
        uses: neondatabase/schema-diff-action@v1
        with:
          project_id: ${{ secrets.NEON_PROJECT_ID }}
          compare_branch: preview/pr-${{ github.event.number }}-${{ steps.branch-name.outputs.current_branch }}
          api_key: ${{ secrets.NEON_API_KEY }}

      - name: Build Project Artifacts
        run: vercel build --token=${{ env.VERCEL_TOKEN }}

      # vercel deploy --prebuilt returns a unique deployment URL each run. To keep
      # a stable preview link per PR branch, we assign a wildcard-domain alias.
      - name: Compute stable preview alias
        if: env.VERCEL_PREVIEW_DOMAIN != ''
        id: preview-alias
        env:
          BRANCH_NAME: ${{ github.event.pull_request.head.ref }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          branch_slug=$(printf '%s' "$BRANCH_NAME" | tr '[:upper:]' '[:lower:]' | sed -E 's#[^a-z0-9]+#-#g; s#(^-|-$)##g; s#-+#-#g' | cut -c1-40)

          if [ -z "$branch_slug" ]; then
            branch_slug="pr-$PR_NUMBER"
          fi

          preview_alias="pr-$PR_NUMBER-$branch_slug.${VERCEL_PREVIEW_DOMAIN}"
          echo "preview_alias=$preview_alias" >> "$GITHUB_OUTPUT"

      - name: Deploy Preview to Vercel
        id: deploy
        env:
          PREVIEW_ALIAS: ${{ steps.preview-alias.outputs.preview_alias }}
        run: |
          deployment_url="$(vercel deploy --prebuilt --token=${{ env.VERCEL_TOKEN }})"
          preview_url="$deployment_url"

          if [ -n "$PREVIEW_ALIAS" ]; then
            vercel alias set "$deployment_url" "$PREVIEW_ALIAS" --token=${{ env.VERCEL_TOKEN }}
            preview_url="https://$PREVIEW_ALIAS"
          fi

          {
            echo "deployment_url=$deployment_url"
            echo "preview_url=$preview_url"
          } >> "$GITHUB_OUTPUT"

          {
            echo "### Preview deployment"
            echo ""
            echo "- Deployment URL: $deployment_url"
            if [ -n "$PREVIEW_ALIAS" ]; then
              echo "- Stable preview URL: $preview_url"
            else
              echo "- Stable preview URL: not configured (set VERCEL_PREVIEW_DOMAIN to enable)"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  main:
    needs: [detect-changes]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - run: pnpm install
      - uses: nrwl/nx-set-shas@v4

      - run: pnpm run format:check

      - name: Get branch name
        id: branch-name
        uses: tj-actions/branch-names@v8

      - name: Create Neon Branch
        id: create-branch
        uses: neondatabase/create-branch-action@v5
        with:
          project_id: ${{ env.NEON_PROJECT_ID }}
          parent: main
          branch_name: test/pr-${{ github.event.number }}-${{ steps.branch-name.outputs.current_branch }}
          username: ${{ env.NEON_DATABASE_USERNAME }}
          database: ${{ env.NEON_DATABASE_NAME }}
          api_key: ${{ env.NEON_API_KEY }}

      - name: Update branch variables
        if: needs.detect-changes.outputs.has_migrations == 'true'
        run: |
          echo "BRANCH_DB_URL=${{ steps.create-branch.outputs.db_url_with_pooler }}" >> $GITHUB_ENV

      - name: Run Migrations
        if: needs.detect-changes.outputs.has_migrations == 'true'
        run: |
          echo "BRANCH_DB_URL: ${{ steps.create-branch.outputs.db_url_with_pooler }}" >> apps/web/.env.production
          pnpm run migrate

      - name: Delete Neon Branch
        if: always()
        uses: neondatabase/delete-branch-action@v3
        with:
          project_id: ${{ secrets.NEON_PROJECT_ID }}
          branch: test/pr-${{ github.event.number }}-${{ github.event.pull_request.head.ref }}
          api_key: ${{ secrets.NEON_API_KEY }}
