name: Deploy Preview

on:
  pull_request:
  merge_group:

concurrency:
  group: deploy-preview-${{ github.event.pull_request.number || github.event.merge_group.head_sha || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  detect-changes:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    outputs:
      has_migrations: ${{ steps.detect.outputs.has_migrations }}
      has_preview_deploy_changes: ${{ steps.detect.outputs.has_preview_deploy_changes }}
    steps:
      - uses: actions/checkout@v4
      - name: Detect Changes
        id: detect
        uses: ./.github/actions/detect-changes

  check-types:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm turbo run check-types --filter=web

  i18n-verify:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Verify i18n locale parity
        run: pnpm run verify:messages

  deploy-preview:
    needs: [detect-changes, check-types, i18n-verify]
    if: github.event_name == 'pull_request' && needs.detect-changes.outputs.has_preview_deploy_changes == 'true'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    env:
      NEON_DATABASE_USERNAME: ${{ secrets.DB_USER_NAME }}
      NEON_DATABASE_NAME: ${{ secrets.DB_NAME }}
      NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
      NEON_PROJECT_ID: ${{ secrets.NEON_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      DEFAULT_DB_URL: ${{ secrets.POSTGRES_URL }}
      PRIVATE_KEY: ${{ secrets.EVM_SC_OWNER_PRIVATE_KEY }}
      DEFAULT_DB_AUTHENTICATED_URL: ${{ secrets.POSTGRES_AUTHENTICATED_URL }}
      DEFAULT_DB_ANONYMOUS_URL: ${{ secrets.POSTGRES_ANONYMOUS_URL }}
      PR_OR_QUEUE_HEAD: ${{ github.event.pull_request.number || github.event.merge_group.head_sha }}

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Get branch name
        if: needs.detect-changes.outputs.has_migrations == 'true'
        id: branch-name
        uses: tj-actions/branch-names@v8

      - name: Create Neon Branch
        if: needs.detect-changes.outputs.has_migrations == 'true'
        id: create-branch
        uses: neondatabase/create-branch-action@v5
        with:
          project_id: ${{ env.NEON_PROJECT_ID }}
          parent: main
          branch_name: preview/pr-${{ env.PR_OR_QUEUE_HEAD }}-${{ steps.branch-name.outputs.current_branch }}
          username: ${{ env.NEON_DATABASE_USERNAME }}
          database: ${{ env.NEON_DATABASE_NAME }}
          api_key: ${{ env.NEON_API_KEY }}

      - name: Update branch variables
        if: needs.detect-changes.outputs.has_migrations == 'true'
        run: |
          echo "BRANCH_DB_URL=${{ steps.create-branch.outputs.db_url_with_pooler }}" >> $GITHUB_ENV

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel Environment Information
        run: vercel pull --yes --environment=preview --token=${{ env.VERCEL_TOKEN }}

      - name: Run Migrations
        if: needs.detect-changes.outputs.has_migrations == 'true'
        env:
          BRANCH_DB_URL: ${{ steps.create-branch.outputs.db_url_with_pooler }}
        run: |
          vercel env pull --environment=preview --token=${{ env.VERCEL_TOKEN }}
          pnpm run migrate

      - name: Post Schema Diff Comment to PR
        if: needs.detect-changes.outputs.has_migrations == 'true'
        uses: neondatabase/schema-diff-action@v1
        with:
          project_id: ${{ secrets.NEON_PROJECT_ID }}
          compare_branch: preview/pr-${{ env.PR_OR_QUEUE_HEAD }}-${{ steps.branch-name.outputs.current_branch }}
          api_key: ${{ secrets.NEON_API_KEY }}

      - name: Build Project Artifacts
        env:
          BRANCH_DB_URL: ${{ steps.create-branch.outputs.db_url_with_pooler }}
        run: |
          vercel env pull --environment=preview --token=${{ env.VERCEL_TOKEN }}
          vercel build --token=${{ env.VERCEL_TOKEN }}

      - name: Deploy Preview to Vercel
        id: deploy
        env:
          BRANCH_DB_URL: ${{ steps.create-branch.outputs.db_url_with_pooler }}
        run: |
          set -uo pipefail
          for attempt in 1 2 3; do
            _log=$(mktemp)
            vercel deploy --prebuilt --token="${VERCEL_TOKEN}" --env "BRANCH_DB_URL=${BRANCH_DB_URL:-}" 2>&1 | tee "$_log"
            code=$?
            out=$(cat "$_log")
            rm -f "$_log"
            if [ "$code" -eq 0 ]; then
              # Last https URL in CLI output (strip carriage returns for Windows-style lines)
              url=$(printf '%s\n' "$out" | tr -d '\r' | grep -oE 'https://[^[:space:]]+' | tail -n1)
              if [ -n "$url" ]; then
                echo "preview_url=${url}" >> "${GITHUB_OUTPUT}"
                exit 0
              fi
            fi
            echo "Vercel deploy (exit $code) or no URL in output — attempt ${attempt}/3, retrying in 25s…" >&2
            if [ "$attempt" -lt 3 ]; then sleep 25; fi
          done
          exit 1

      - name: Sticky — Vercel preview URL
        if: success() && steps.deploy.outputs.preview_url != ''
        uses: marocchino/sticky-pull-request-comment@0ea0beb66eb9baf113663a64ec522f60e49231c0 # v3.0.4
        with:
          header: vercel-pr-preview
          number: ${{ github.event.pull_request.number }}
          message: |
            | | |
            |:--|:--|
            | **Preview** | ${{ steps.deploy.outputs.preview_url }} |
            | **Commit** | `${{ github.event.pull_request.head.sha }}` |

            _Deployment: [view run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})_

  main:
    needs: [detect-changes]
    runs-on: blacksmith-4vcpu-ubuntu-2404
    env:
      NEON_DATABASE_USERNAME: ${{ secrets.DB_USER_NAME }}
      NEON_DATABASE_NAME: ${{ secrets.DB_NAME }}
      NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
      NEON_PROJECT_ID: ${{ secrets.NEON_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      DEFAULT_DB_URL: ${{ secrets.POSTGRES_URL }}
      PRIVATE_KEY: ${{ secrets.EVM_SC_OWNER_PRIVATE_KEY }}
      DEFAULT_DB_AUTHENTICATED_URL: ${{ secrets.POSTGRES_AUTHENTICATED_URL }}
      DEFAULT_DB_ANONYMOUS_URL: ${{ secrets.POSTGRES_ANONYMOUS_URL }}
      PR_OR_QUEUE_HEAD: ${{ github.event.pull_request.number || github.event.merge_group.head_sha }}

    steps:
      - uses: actions/checkout@v4

      # Must run before format:check — if format fails, later steps are skipped but
      # Delete Neon Branch uses `if: always()` and needs this output for the branch name.
      - name: Get branch name
        if: needs.detect-changes.outputs.has_migrations == 'true'
        id: branch-name
        uses: tj-actions/branch-names@v8

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - run: pnpm run format:check

      - name: Create Neon Branch
        if: needs.detect-changes.outputs.has_migrations == 'true'
        id: create-branch
        uses: neondatabase/create-branch-action@v5
        with:
          project_id: ${{ env.NEON_PROJECT_ID }}
          parent: main
          branch_name: test/pr-${{ env.PR_OR_QUEUE_HEAD }}-${{ steps.branch-name.outputs.current_branch }}
          username: ${{ env.NEON_DATABASE_USERNAME }}
          database: ${{ env.NEON_DATABASE_NAME }}
          api_key: ${{ env.NEON_API_KEY }}

      - name: Update branch variables
        if: needs.detect-changes.outputs.has_migrations == 'true'
        run: |
          echo "BRANCH_DB_URL=${{ steps.create-branch.outputs.db_url_with_pooler }}" >> $GITHUB_ENV

      - name: Run Migrations
        if: needs.detect-changes.outputs.has_migrations == 'true'
        run: |
          echo "BRANCH_DB_URL: ${{ steps.create-branch.outputs.db_url_with_pooler }}" >> apps/web/.env.production
          pnpm run migrate

      - name: Delete Neon Branch
        if: always() && needs.detect-changes.outputs.has_migrations == 'true' && steps.create-branch.outcome == 'success'
        uses: neondatabase/delete-branch-action@v3
        with:
          project_id: ${{ secrets.NEON_PROJECT_ID }}
          branch: test/pr-${{ env.PR_OR_QUEUE_HEAD }}-${{ steps.branch-name.outputs.current_branch }}
          api_key: ${{ secrets.NEON_API_KEY }}
