name: QA E2E Production Public

on:
  pull_request:
  merge_group:
  workflow_dispatch:

concurrency:
  group: qa-e2e-production-public-${{ github.event.pull_request.number || github.event.merge_group.head_sha || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  qa-e2e-production-public:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Run production public smoke suite
        run: pnpm nx run web-e2e:e2e-production-public

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-production-public-report
          path: |
            apps/web-e2e/playwright-report-production
            apps/web-e2e/test-results-production
          if-no-files-found: ignore
          retention-days: 7
