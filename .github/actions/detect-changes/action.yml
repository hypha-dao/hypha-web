name: 'Detect Repository Changes'
description: 'Detects changes in specific paths of the repository'

outputs:
  has_migrations:
    description: 'Whether there are changes in migration files'
    value: ${{ steps.changes.outputs.migrations }}
  has_preview_deploy_changes:
    description: 'Whether there are changes that require a preview deploy build'
    value: ${{ steps.changes.outputs.preview_deploy }}

runs:
  using: 'composite'
  steps:
    # Immutable pin for supply-chain safety (tag v4.0.0 moves on re-tags)
    - uses: dorny/paths-filter@9d7afb8d214ad99e78fbd4247752c4caed2b6e4c # v4.0.0
      id: changes
      with:
        # Empty token forces local git diff instead of GitHub REST API.
        # Avoids hard failures when API Requests are degraded (unicorn/503).
        token: ''
        base: ${{ github.base_ref || github.event.repository.default_branch }}
        filters: |
          migrations:
            - 'packages/storage-postgres/migrations/**'
          preview_deploy:
            - 'apps/**'
            - 'packages/**'
            - 'config/**'
            - 'package.json'
            - 'pnpm-lock.yaml'
            - 'pnpm-workspace.yaml'
            - 'turbo.json'
