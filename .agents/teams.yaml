teams:
  agentic-engineering:
    description: >
      Agentic engineering team for the hypha-web DAO platform.
      Coordinates specialized agents across fullstack development,
      database engineering, security, QA, UI/UX design, product ownership,
      requirements engineering, i18n, prompt engineering, user research,
      meta-cognition, and Cursor IDE configuration.
