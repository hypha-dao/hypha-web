# Example coturn config for Hypha Matrix (Dendrite) VoIP / TURN.
# Copy to your TURN host, set secrets and DNS, then align dendrite.yaml client_api.turn.
# Operator guide: docs/requirements/matrix-voip-turn-server-setup.md

listening-port=3478
listening-ip=0.0.0.0

fingerprint
use-auth-secret
static-auth-secret=REPLACE_WITH_SAME_VALUE_AS_DENDRITE_turn_shared_secret

realm=turn.example.org
server-name=turn.example.org
external-ip=REPLACE_WITH_PUBLIC_IPV4

min-port=49152
max-port=65535

no-multicast-peers
no-loopback-peers
no-cli
simple-log

# Optional TLS TURN (open TCP 5349; add turns: URI in Dendrite turn_uris):
# cert-file=/etc/letsencrypt/live/turn.example.org/fullchain.pem
# pkey-file=/etc/letsencrypt/live/turn.example.org/privkey.pem
# listening-port-tls=5349
